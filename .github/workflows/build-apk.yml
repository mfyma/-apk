name: Build Android APK from ZIP

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "GodotAICraft_Android_v2.0.zip"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: read

env:
  GODOT_VERSION: "4.4.1"
  ZIP_FILE: "GodotAICraft_Android_v2.0.zip"
  PROJECT_DIR: "extracted/GodotAICraft_Android_v2.0"
  APK_PATH: "extracted/GodotAICraft_Android_v2.0/build/android/GodotAICraft-debug.apk"

jobs:
  build-apk:
    name: Unzip and build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Godot with export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages required by Godot 4.4
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "cmdline-tools;latest" \
            "cmake;3.10.2.4988404" \
            "ndk;23.2.8568313"

          sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --list_installed
          adb start-server || true

      - name: Extract project ZIP
        shell: bash
        run: |
          set -euo pipefail
          test -f "$ZIP_FILE"
          rm -rf extracted
          mkdir -p extracted
          unzip -q "$ZIP_FILE" -d extracted
          test -f "$PROJECT_DIR/project.godot"
          test -f "$PROJECT_DIR/export_presets.cfg"

          # اجعل نسخة SDK المطلوبة صريحة بدل الاعتماد على الاكتشاف التلقائي.
          sed -i 's|gradle_build/min_sdk=""|gradle_build/min_sdk="24"|' "$PROJECT_DIR/export_presets.cfg"
          sed -i 's|gradle_build/target_sdk=""|gradle_build/target_sdk="34"|' "$PROJECT_DIR/export_presets.cfg"

          grep -nE 'gradle_build/(min_sdk|target_sdk)' "$PROJECT_DIR/export_presets.cfg"

      - name: Create Android debug keystore
        shell: bash
        run: |
          set -euo pipefail
          keytool -genkeypair \
            -keystore "$GITHUB_WORKSPACE/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Godot AI Craft,C=US"

      - name: Configure Godot Android paths
        shell: bash
        run: |
          set -euo pipefail
          JAVA_DIR="${JAVA_HOME}"
          SDK_DIR="${ANDROID_SDK_ROOT}"

          test -d "$JAVA_DIR"
          test -d "$SDK_DIR"
          mkdir -p "$HOME/.config/godot"

          cat > "$HOME/.config/godot/editor_settings-4.tres" <<SETTINGS
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$SDK_DIR"
          export/android/java_sdk_path = "$JAVA_DIR"
          export/android/debug_keystore = "$GITHUB_WORKSPACE/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          SETTINGS

          godot --version
          java -version
          sdkmanager --version

      - name: Import and validate Godot project
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --path "$PROJECT_DIR" --editor --quit

      - name: Build Debug APK
        shell: bash
        run: |
          set -euo pipefail
          APK_ABS="$GITHUB_WORKSPACE/$APK_PATH"
          mkdir -p "$(dirname "$APK_ABS")"
          godot --headless --path "$PROJECT_DIR" --export-debug "Android" "$APK_ABS"
          test -s "$APK_ABS"
          sha256sum "$APK_ABS" | tee "${APK_ABS}.sha256"
          ls -lh "$APK_ABS" "${APK_ABS}.sha256"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GodotAICraft-debug-apk
          path: |
            ${{ env.APK_PATH }}
            ${{ env.APK_PATH }}.sha256
          if-no-files-found: error
          retention-days: 30
